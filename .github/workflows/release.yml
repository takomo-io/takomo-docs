name: Release

on:
  push:
    branches:
      - release/v**

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.DOCS_AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.DOCS_AWS_SECRET_ACCESS_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - uses: actions/setup-node@v2-beta
        with:
          node-version: 14.4.0
      - uses: actions/cache@v1
        with:
          path: node_modules
          key: npm-${{ hashFiles('yarn.lock') }}
      - run: echo "CURRENT_RELEASE=$(echo ${GITHUB_REF#refs/heads/})" >> $GITHUB_ENV
      - run: echo "DOCS_BASE=$(echo /docs/$CURRENT_RELEASE/ | tr '.' '-')" >> $GITHUB_ENV
      - run: yarn
      - run: yarn build
      - run: ./ci/publish-versioned-docs.sh
      - run: ./ci/update-version-list.sh
